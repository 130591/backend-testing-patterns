services:
  postgres:
    image: postgres:16-alpine
    container_name: medical-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_testing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medical-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog
    container_name: medical-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: medical-fhir
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
